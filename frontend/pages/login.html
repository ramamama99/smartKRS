<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk — SmartKRS</title>
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/auth.css" />
  <link rel="stylesheet" href="../assets/css/login.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
</head>
<body>

  <div class="login-screen">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand">
        <div class="login-logo-mark">S</div>
        <div class="login-brand-name">SmartKRS</div>
      </div>

      <!-- Title -->
      <h1 class="login-title">Selamat <em>datang kembali</em></h1>
      <p class="login-sub">Masuk ke akun untuk lihat jadwal kamu</p>

      <!-- Alert -->
      <div id="alert" class="alert"></div>

      <!-- Form -->
      <form class="auth-form" id="login-form">
        <div class="field">
          <label for="email">Email kampus</label>
          <input
            class="input"
            type="email"
            id="email"
            name="email"
            placeholder="kamu@student.telkomuniversity.ac.id"
            required
          />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input
              class="input"
              type="password"
              id="password"
              name="password"
              placeholder="Masukkan password"
              required
            />
            <button type="button" class="eye-btn" id="toggle-password" tabindex="-1">
              <i class="ti ti-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>

        <div class="login-row">
          <label class="login-remember">
            <div class="check" id="remember-check"></div>
            <span>Ingat saya</span>
          </label>
          <span class="login-forgot">Lupa password?</span>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
          <span id="submit-text">Masuk</span>
          <i class="ti ti-arrow-right"></i>
        </button>
      </form>

      <!-- Divider -->
      <div class="login-divider">
        <div class="login-divider-line"></div>
        <div class="login-divider-text">ATAU</div>
        <div class="login-divider-line"></div>
      </div>

      <!-- Footer -->
      <div class="form-footer">
        Belum punya akun? <a href="register.html" class="form-link">Daftar gratis</a>
      </div>

    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/login.js"></script>

</body>
</html>
